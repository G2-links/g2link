name: Build & Release G2-Link APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Download gradle-wrapper.jar (binary — cannot be stored as text in repo)
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar ready: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      # IMPORTANT: NO "android/" prefix — gradlew is at repo ROOT
      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "G2-Link ${{ steps.version.outputs.VERSION_NAME }}"
          body: |
            ## G2-Link ${{ steps.version.outputs.VERSION_NAME }}

            ### How to Install
            1. Download app-release.apk below
            2. On Android: Settings → Security → Allow unknown sources
            3. Open the APK file and tap Install

            ### Requirements
            - Android 8.0 (API 26) or higher
            - Grant Bluetooth and Location permissions when prompted

            ---
            *Free forever. No account. No internet required to use.*
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: g2link-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  deploy-website:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
