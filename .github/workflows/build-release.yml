name: Build & Release G2-Link APK

on:
  push:
    tags:
      - 'v*'          # Triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ─────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Make Gradle executable ─────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 4. Cache Gradle dependencies ──────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 5. Build Release APK ──────────────────────────
      - name: Build Release APK
        run: ./android/gradlew assembleRelease
        # Note: For signed release APK, add signing config:
        # env:
        #   SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        #   SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        #   SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      # ── 6. Build Debug APK (for testing) ─────────────
      - name: Build Debug APK
        run: ./android/gradlew assembleDebug

      # ── 7. Get version name ───────────────────────────
      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ── 8. Create GitHub Release ──────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "G2-Link ${{ steps.version.outputs.VERSION_NAME }}"
          body: |
            ## G2-Link ${{ steps.version.outputs.VERSION_NAME }}

            ### Installation
            1. Download `app-release.apk` below
            2. On your Android phone: Settings → Security → Allow unknown sources
            3. Open the downloaded file and tap Install

            ### What's New
            See commit history for changes in this release.

            ### Requirements
            - Android 8.0 (API 26) or higher
            - Bluetooth and Location permissions

            ---
            *Free forever. No account. No internet required to use.*
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Upload APK as artifact (for non-tag builds) ─
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: g2link-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── DEPLOY WEBSITE TO GITHUB PAGES ──────────────────────
  deploy-website:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
